name: Proxy Auto System

on:
  schedule:
    - cron: '0 * * * *' # Berjalan otomatis setiap 2 jam agar stabil
  workflow_dispatch: # Tombol manual di tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    # Kita beri batas 2 jam, jika lebih dari itu sistem akan stop otomatis
    timeout-minutes: 120 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mengambil history lengkap untuk rebase yang mulus

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Proxy Engine
        run: python main.py
        env:
          # Memastikan log Progress muncul detik demi detik
          PYTHONUNBUFFERED: "1"

      - name: Save & Push Results
        run: |
          # Setup Identitas Bot GitHub resmi
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Ambil folder hasil kerja skrip
          git add results/
          
          # 2. Amankan dalam satu commit lokal (biar tidak "unstaged changes")
          git commit -m "Auto Update: $(date '+%Y-%m-%d %H:%M')" || exit 0
          
          # 3. Tarik data terbaru dan tumpuk di bawah commit kita (Rebase)
          git pull origin main --rebase
          
          # 4. Dorong ke repositori
          git push origin main
